<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>

/* 🔷 Reset */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

/* 🔷 Background */
body {
    display: flex;
    background: linear-gradient(rgba(10,61,98,0.9), rgba(10,61,98,0.9)),
    url("https://images.unsplash.com/photo-1586773860418-d37222d8fce3?auto=format&fit=crop&w=1600&q=80");
    background-size: cover;
}

/* 🔷 Sidebar */
.sidebar {
    width: 240px;
    height: 100vh;
    background: rgba(10,61,98,0.95);
    color: white;
    position: fixed;
    padding: 25px;
}

.sidebar h2 {
    font-size: 24px;
    margin-bottom: 40px;
}

.sidebar ul li {
    padding: 12px;
    margin-bottom: 12px;
    cursor: pointer;
    border-radius: 8px;
    font-size: 16px;
}

.sidebar ul li:hover {
    background: linear-gradient(135deg, #38ada9, #079992);
}

/* 🔷 Main */
.main {
    margin-left: 240px;
    width: 100%;
}

/* 🔷 Topbar */
.topbar {
    background: linear-gradient(135deg, #38ada9, #079992);
    padding: 18px 30px;
    color: white;
    display: flex;
    justify-content: space-between;
    font-size: 18px;
}

/* 🔷 Dashboard Cards */
.cards {
    display: flex;
    gap: 25px;
    padding: 30px;
    flex-wrap: wrap;
}

.card {
    background: white;
    padding: 30px;
    width: 250px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-8px);
}

.card h2 {
    font-size: 32px;
    color: #38ada9;
}

.card p {
    margin-top: 10px;
    font-size: 16px;
    color: #555;
}

/* 🔷 Section */
.section {
    padding: 30px;
    color: white;
}

/* 🔷 Center Forms */
.section-content {
    display: flex;
    justify-content: center;
}

/* 🔷 Form Box */
.section-box {
    background: rgba(255,255,255,0.95);
    color: #333;
    padding: 30px;
    border-radius: 15px;
    width: 400px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

/* 🔷 Headings */
.section-box h4 {
    margin-top: 20px;
    margin-bottom: 10px;
    font-size: 18px;
}

/* 🔷 Inputs */
.section-box input,
.section-box select,
.section-box textarea {
    width: 100%;
    padding: 10px;
    margin-bottom: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
}

/* 🔷 Button */
button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(135deg, #38ada9, #079992);
    border: none;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
}

button:hover {
    transform: scale(1.05);
}
/* DROPDOWN */
.dropdown {
    display: none;
    position: absolute;
    right: 0;
    top: 40px;
    background: white;
    color: black;
    border-radius: 8px;
    width: 140px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

.dropdown a {
    display: block;
    padding: 10px;
    text-decoration: none;
    color: black;
}

.dropdown a:hover {
    background: #f1f1f1;
}

</style>
</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>⚙ Admin</h2>
    <ul>
        <li onclick="showSection('dashboard')">Dashboard</li>
        <li onclick="showSection('doctors')">Manage Doctors</li>
        <li onclick="showSection('reports')">Manage Reports</li>
        <li onclick="showSection('appointments')">Appointments</li>
    </ul>
</div>

<!-- Main -->
<div class="main">
    <div th:if="${message}" class="alert">
        <span th:text="${message}"></span>
    </div>

    <div class="topbar">
        <h3>Admin Dashboard</h3>
        <div class="right" onclick="toggleDropdown()">
            👤 <span>Admin</span>
            <div class="dropdown" id="dropdownMenu">
                
                <a href="/">Logout</a>
            </div>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="section">
        <div class="cards">
            <div class="card">
                <h2>120</h2>
                <p>Total Patients</p>
            </div>
            <div class="card">
                <h2>45</h2>
                <p>Total Doctors</p>
            </div>
            <div class="card">
                <h2>78</h2>
                <p>Appointments</p>
            </div>
        </div>
    </div>

    <!-- Doctors -->
   <div id="doctors" class="section" style="display:none;">
    <div class="section-content">
        <div class="section-box">

            <h3>Manage Doctors</h3>

            <!-- 🔷 Add Doctor FORM -->
            <form action="/addDoctor" method="post">

                <h4>Add Doctor</h4>

                <input type="text" name="name" placeholder="Doctor Name" required>
                <input type="text" name="specialization" placeholder="Specialization" required>
                <input type="text" name="qualification" placeholder="Qualification" required>
                <input type="number" name="experience" placeholder="Experience" required>
                <input type="text" name="phone" placeholder="Phone" required>
                <input type="email" name="email" placeholder="Email" required>
                <input type="number" name="fee" placeholder="Fee" required>

                <button type="submit">Add Doctor</button>

            </form>

            
            <form action="/removeDoctor" method="post">

                <h4>Remove Doctor</h4>

                <input type="number" name="id" placeholder="Doctor ID" required>

                <button type="submit">Remove Doctor</button>

            </form>

        </div>
    </div>
</div>

    <!-- Reports -->
    <div id="reports" class="section" style="display:none;">
        <div class="section-content">
            <div class="section-box">

                <h3>Manage Reports</h3>

                <h4>Add Report</h4>
                <input type="text" placeholder="Report ID">
                <input type="text" placeholder="Patient ID">

                <select>
                    <option>Select Report Type</option>
                    <option>Blood Test</option>
                    <option>X-Ray</option>
                    <option>MRI</option>
                </select>

                <input type="date">
                <textarea placeholder="Report Details"></textarea>

                <button>Add Report</button>

                <h4>Remove Report</h4>
                <input type="text" placeholder="Report ID">
                <button>Remove Report</button>

            </div>
        </div>
    </div>

</div>

<script>
function showSection(id) {
    document.querySelectorAll('.section').forEach(sec => sec.style.display = 'none');
    document.getElementById(id).style.display = 'block';
}

function toggleDropdown() {
    let menu = document.getElementById("dropdownMenu");
    menu.style.display = (menu.style.display === "block") ? "none" : "block";
}
</script>


</body>
</html>
