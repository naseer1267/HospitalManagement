<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body {
            min-height: 100vh;
            background: linear-gradient(rgba(10,61,98,0.85), rgba(10,61,98,0.85)),
                        url("https://images.unsplash.com/photo-1586773860418-d37222d8fce3?auto=format&fit=crop&w=1600&q=80");
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .form-container {
            background: rgba(255,255,255,0.96);
            padding: 35px;
            width: 350px; /* Made it slightly smaller for Admin */
            border-radius: 15px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.3);
            text-align: center;
        }
        .form-container h2 { margin-bottom: 20px; color: #0a3d62; }
        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { font-weight: 600; font-size: 14px; }
        .input-group input {
            width: 100%; padding: 10px; margin-top: 5px;
            border-radius: 8px; border: 1px solid #ccc;
        }
        .btn {
            width: 100%; padding: 10px; background: #e74c3c; /* Red button to differentiate from patient login */
            border: none; color: white; border-radius: 8px; cursor: pointer; margin-top: 10px;
        }
        .error-msg { color: red; font-size: 14px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Admin Portal</h2>
        
        <div th:if="${error != null}">
            <p class="error-msg" th:text="${error}"></p>
        </div>

        <form action="/loginAdmin" method="post">
            <div class="input-group">
                <label>Admin Mobile Number</label>
                <input type="tel" name="number" required>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <button type="submit" class="btn">Secure Login</button>
        </form>
        <br>
        <a href="/" style="text-decoration: none; color: #0a3d62; font-size: 14px;">&larr; Back to Home</a>
    </div>
</body>
</html>
