<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Report Details</title>
    <style>
        body {
            margin: 0; font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(rgba(10,61,98,0.85), rgba(10,61,98,0.85)),
                        url("https://images.unsplash.com/photo-1586773860418-d37222d8fce3");
            background-size: cover; min-height: 100vh;
        }
        .navbar {
            display: flex; align-items: center; justify-content: center; position: relative;
            background: rgba(10, 61, 98, 0.9); padding: 18px 20px; color: white;
        }
        .back-icon {
            position: absolute; left: 20px; font-size: 22px; color: white;
            text-decoration: none; transition: 0.3s;
        }
        .back-icon:hover { transform: scale(1.2); }
        .navbar h2 { font-size: 22px; font-weight: bold; margin: 0; }
        
        .details-container {
            display: flex; justify-content: center; align-items: center; padding: 60px 20px;
        }
        .details-card {
            background: rgba(255,255,255,0.96); width: 600px; padding: 40px;
            border-radius: 15px; box-shadow: 0 12px 35px rgba(0,0,0,0.3);
        }
        .header-box { border-bottom: 2px solid #eee; padding-bottom: 20px; margin-bottom: 20px; }
        .header-box h1 { color: #0a3d62; font-size: 28px; margin-bottom: 10px; }
        .header-box p { color: #555; font-size: 16px; font-weight: bold; }
        .content-box { background: #f5f6fa; padding: 20px; border-radius: 8px; border-left: 5px solid #38ada9; }
        .content-box p { font-size: 16px; line-height: 1.6; color: #333; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="/reports" class="back-icon">⬅ Back to List</a>
        <h2>📄 Full Report</h2>
    </div>

    <div class="details-container">
        <div class="details-card">
            <div class="header-box">
                <h1 th:text="${record.recordType}"></h1>
                <p>📅 Conducted on: <span th:text="${record.recordDate}"></span></p>
                <p>🆔 Record ID: <span th:text="${record.recordId}"></span></p>
            </div>
            
            <div class="content-box">
                <h3 style="color: #38ada9; margin-bottom: 10px;">Medical Details:</h3>
                <p th:text="${record.details}"></p>
            </div>
        </div>
    </div>
</body>
</html>
